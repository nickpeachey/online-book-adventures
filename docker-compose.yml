services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cyoa
      POSTGRES_USER: cyoa
      POSTGRES_PASSWORD: cyoa_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyoa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: cyoa
      RABBITMQ_DEFAULT_PASS: cyoa_dev_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: cyoa
      MINIO_ROOT_PASSWORD: cyoa_dev_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=cyoa;Username=cyoa;Password=cyoa_dev_password"
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__MinIO: "http://minio:9000"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: cyoa
      RabbitMQ__Password: cyoa_dev_password
      MinIO__AccessKey: cyoa
      MinIO__SecretKey: cyoa_dev_password
      OpenAI__ApiKey: ${OPENAI_API_KEY:-}
      Cors__AllowedOrigins__0: http://localhost:3000
      JwtSettings__SecretKey: ${JWT_SECRET_KEY:-super-secret-dev-key-min-32-chars!!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client JS bundle — must be reachable from the user's browser.
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    environment:
      # Server-side only: used by Next.js rewrites to reach the backend over the Docker network.
      API_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
